[pytest]
# Default: run only unit tests. To run integration tests explicitly:
#   pytest test/ -m integration
#   pytest test/ -m "integration and not slow"
#   pytest test/ -m slow        (chaos / Sentinel tests — need full Docker stack)
addopts = -m "not integration"

markers =
    integration: marks tests that require a running Docker Compose stack
    slow: marks long-running tests (Sentinel failover, chaos) — subset of integration
