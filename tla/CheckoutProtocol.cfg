SPECIFICATION Spec

\* ================================================================
\* Constants
\* ================================================================
CONSTANT
    INITIAL_STOCK = 10
    INITIAL_CREDIT = 100
    RESERVE_AMOUNT = 3
    PAYMENT_AMOUNT = 15
    MAX_CONFIRM_RETRIES = 2

\* ================================================================
\* Invariants — safety properties checked at every reachable state
\* ================================================================

\* PASS — idempotency keys prevent double-decrement
INVARIANT NoDoubleSpend

\* PASS — structural sanity (reserved counters never negative)
INVARIANT NonNegativeReserved

\* PASS — available + reserved + sold = initial (conservation holds)
INVARIANT StockConservationTerminal
INVARIANT CreditConservationTerminal

\* PASS (was VIOLATED) — FIX 2: recovery waits for confirm responses
INVARIANT CompletedImpliesBothConfirmed

\* PASS (was VIOLATED) — FIX 3: cancel restores counters from fallback amount key
INVARIANT NoLeakedReservations

\* PASS (was VIOLATED) — FIX 2 + FIX 3: response-aware recovery + cancel on exhaustion
INVARIANT AtomicOutcome

\* ================================================================
\* Temporal properties (checked with fairness assumptions)
\* ================================================================

\* PASS — every saga eventually reaches COMPLETED or FAILED
PROPERTY EventualTermination

\* ================================================================
\* State constraint — bound message queues to keep state space finite
\* ================================================================
CONSTRAINT StateConstraint
