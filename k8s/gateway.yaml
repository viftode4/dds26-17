apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-conf
data:
  nginx.conf: |
    worker_processes 4;
    events { worker_connections 2048;}

    http {
        upstream order-app {
            server order-service:5000;
        }
        upstream payment-app {
            server payment-service:5000;
        }
        upstream stock-app {
            server stock-service:5000;
        }
        server {
            listen 80;
            location /health {
                return 200 'ok';
                add_header Content-Type text/plain;
            }
            location /orders/ {
               proxy_pass   http://order-app/;
            }
            location /payment/ {
               proxy_pass   http://payment-app/;
            }
            location /stock/ {
               proxy_pass   http://stock-app/;
            }
            access_log  /var/log/nginx/server.access.log;
        }
        access_log  /var/log/nginx/access.log;
    }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 80
      name: http
      targetPort: 80
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-bookworm
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              memory: 64Mi
              cpu: 200m
            limits:
              memory: 256Mi
              cpu: 1000m
      volumes:
        - name: nginx-conf
          configMap:
            name: gateway-nginx-conf
