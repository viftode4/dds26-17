apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-conf
data:
  nginx.conf: |
    events { worker_connections 2048;}

    http {
        upstream order-app {
            server order-service:5000;
        }
        upstream payment-app {
            server payment-service:5000;
        }
        upstream stock-app {
            server stock-service:5000;
        }
        server {
            listen 80;
            location /orders/ {
               proxy_pass   http://order-app/;
            }
            location /payment/ {
               proxy_pass   http://payment-app/;
            }
            location /stock/ {
               proxy_pass   http://stock-app/;
            }
            access_log  /var/log/nginx/server.access.log;
        }
        access_log  /var/log/nginx/access.log;
    }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - port: 80
      name: http
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-bookworm
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 100m
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: nginx-conf
          configMap:
            name: gateway-nginx-conf
