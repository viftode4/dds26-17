services:

  gateway:
    image: haproxy:3.0-bookworm
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8000:80"
      # - "[::1]:8000:80"
    depends_on:
      order-service-1:
        condition: service_healthy
      order-service-2:
        condition: service_healthy
      stock-service:
        condition: service_healthy
      stock-service-2:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      payment-service-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  order-service-1:
    build: ./order
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=1024
      - REDIS_REPLICA_POOL_SIZE=512
    command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 2 --loop uvloop app:app
    env_file:
      - env/order_redis.env
    volumes:
      - ./common:/app/common:ro
      - ./orchestrator:/app/orchestrator:ro
      - ./lua:/app/lua:ro
    depends_on:
      order-db:
        condition: service_started
      order-db-replica:
        condition: service_started
      order-db-replica-2:
        condition: service_started
      nats:
        condition: service_started
      sentinel-1:
        condition: service_started
      sentinel-2:
        condition: service_started
      sentinel-3:
        condition: service_started
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 512M

  order-service-2:
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-2
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=1024
      - REDIS_REPLICA_POOL_SIZE=512
    command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 2 --loop uvloop app:app
    env_file:
      - env/order_redis.env
    volumes:
      - ./common:/app/common:ro
      - ./orchestrator:/app/orchestrator:ro
      - ./lua:/app/lua:ro
    depends_on:
      order-db:
        condition: service_started
      order-db-replica:
        condition: service_started
      order-db-replica-2:
        condition: service_started
      nats:
        condition: service_started
      sentinel-1:
        condition: service_started
      sentinel-2:
        condition: service_started
      sentinel-3:
        condition: service_started
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 512M

  # ---- Redis Masters ----
  order-db:
    image: valkey/valkey:8.1-bookworm
    command: >
      redis-server
        --requirepass redis
        --masterauth redis
        --maxmemory 400mb
        --appendonly yes
        --appendfsync everysec
        --io-threads 8
        --io-threads-do-reads yes
        --maxclients 8192
    deploy:
      resources:
        limits:
          cpus: "5.0"
          memory: 512M

  stock-db:
    image: valkey/valkey:8.1-bookworm
    command: >
      redis-server
        --requirepass redis
        --masterauth redis
        --maxmemory 350mb
        --appendonly yes
        --appendfsync everysec
        --io-threads 8
        --io-threads-do-reads yes
        --maxclients 8192
        --min-replicas-to-write 1
        --min-replicas-max-lag 10
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 512M

  payment-db:
    image: valkey/valkey:8.1-bookworm
    command: >
      redis-server
        --requirepass redis
        --masterauth redis
        --maxmemory 350mb
        --appendonly yes
        --appendfsync everysec
        --io-threads 8
        --io-threads-do-reads yes
        --maxclients 8192
        --min-replicas-to-write 1
        --min-replicas-max-lag 10
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 512M

  # ---- Redis Replicas ----
  order-db-replica:
    image: valkey/valkey:8.1-bookworm
    command: >
      redis-server
        --requirepass redis
        --maxmemory 200mb
        --replicaof order-db 6379
        --masterauth redis
    depends_on:
      order-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  order-db-replica-2:
    image: valkey/valkey:8.1-bookworm
    command: >
      redis-server
        --requirepass redis
        --maxmemory 200mb
        --replicaof order-db 6379
        --masterauth redis
    depends_on:
      order-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  stock-db-replica:
    image: valkey/valkey:8.1-bookworm
    command: >
      redis-server
        --requirepass redis
        --maxmemory 200mb
        --replicaof stock-db 6379
        --masterauth redis
    depends_on:
      stock-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  stock-db-replica-2:
    image: valkey/valkey:8.1-bookworm
    command: >
      redis-server
        --requirepass redis
        --maxmemory 200mb
        --replicaof stock-db 6379
        --masterauth redis
    depends_on:
      stock-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  payment-db-replica:
    image: valkey/valkey:8.1-bookworm
    command: >
      redis-server
        --requirepass redis
        --maxmemory 200mb
        --replicaof payment-db 6379
        --masterauth redis
    depends_on:
      payment-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  payment-db-replica-2:
    image: valkey/valkey:8.1-bookworm
    command: >
      redis-server
        --requirepass redis
        --maxmemory 200mb
        --replicaof payment-db 6379
        --masterauth redis
    depends_on:
      payment-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  # ---- NATS ----
  nats:
    image: nats:2.11-alpine
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 64M

  # ---- Sentinel Nodes ----
  # Entrypoint resolves hostnames to IPs at startup so Sentinel
  # tracks masters by IP — failover works even when master DNS disappears.
  sentinel-1:
    image: valkey/valkey:8.1-bookworm
    command: sh /etc/redis/sentinel-entrypoint.sh
    volumes:
      - ./sentinel-entrypoint.sh:/etc/redis/sentinel-entrypoint.sh:ro
    depends_on:
      order-db:
        condition: service_started
      order-db-replica:
        condition: service_started
      order-db-replica-2:
        condition: service_started
      stock-db:
        condition: service_started
      stock-db-replica:
        condition: service_started
      stock-db-replica-2:
        condition: service_started
      payment-db:
        condition: service_started
      payment-db-replica:
        condition: service_started
      payment-db-replica-2:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

  sentinel-2:
    image: valkey/valkey:8.1-bookworm
    command: sh /etc/redis/sentinel-entrypoint.sh
    volumes:
      - ./sentinel-entrypoint.sh:/etc/redis/sentinel-entrypoint.sh:ro
    depends_on:
      order-db:
        condition: service_started
      order-db-replica:
        condition: service_started
      order-db-replica-2:
        condition: service_started
      stock-db:
        condition: service_started
      stock-db-replica:
        condition: service_started
      stock-db-replica-2:
        condition: service_started
      payment-db:
        condition: service_started
      payment-db-replica:
        condition: service_started
      payment-db-replica-2:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

  sentinel-3:
    image: valkey/valkey:8.1-bookworm
    command: sh /etc/redis/sentinel-entrypoint.sh
    volumes:
      - ./sentinel-entrypoint.sh:/etc/redis/sentinel-entrypoint.sh:ro
    depends_on:
      order-db:
        condition: service_started
      order-db-replica:
        condition: service_started
      order-db-replica-2:
        condition: service_started
      stock-db:
        condition: service_started
      stock-db-replica:
        condition: service_started
      stock-db-replica-2:
        condition: service_started
      payment-db:
        condition: service_started
      payment-db-replica:
        condition: service_started
      payment-db-replica-2:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

  stock-service:
