services:

  gateway:
    image: haproxy:3.0-bookworm
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8000:80"
      # - "[::1]:8000:80"
    depends_on:
      order-service-1:
        condition: service_healthy
      order-service-2:
        condition: service_healthy
      stock-service:
        condition: service_healthy
      stock-service-2:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      payment-service-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  order-service-1:
    build: ./order
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=1024
    command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 2 --loop uvloop app:app
    env_file:
      - env/order_redis.env
    volumes:
      - ./common:/app/common:ro
      - ./orchestrator:/app/orchestrator:ro
      - ./lua:/app/lua:ro
    depends_on:
      cluster-init:
        condition: service_completed_successfully
      nats:
        condition: service_started
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 512M

  order-service-2:
