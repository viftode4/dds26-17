# Medium cluster — ~47 CPU total
# System: ~39 CPU | Locust: ~8 CPU
# App: 4 order + 4 stock + 4 payment instances, 2 Granian workers each
# Pool: 768 master per instance (8 order processes, 8 stock, 8 payment)

x-order-service: &order-service
  image: order:latest
  command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 2 --loop uvloop app:app
  environment:
    - REDIS_MASTER_POOL_SIZE=4096
  env_file:
    - env/order_redis.env
  volumes:
    - ./common:/app/common:ro
    - ./orchestrator:/app/orchestrator:ro
    - ./lua:/app/lua:ro
  depends_on:
    cluster-init:
      condition: service_completed_successfully
    nats:
      condition: service_started
  restart: on-failure
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 5s
    timeout: 3s
    start_period: 30s
    retries: 3
  deploy:
    resources:
      limits:
        cpus: "3.0"
        memory: 512M

x-stock-service: &stock-service
  image: stock:latest
  command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 2 --loop uvloop app:app
  environment:
    - REDIS_MASTER_POOL_SIZE=768
  env_file:
    - env/stock_redis.env
  volumes:
    - ./common:/app/common:ro
    - ./orchestrator:/app/orchestrator:ro
    - ./lua:/app/lua:ro
  depends_on:
    cluster-init:
      condition: service_completed_successfully
    nats:
      condition: service_started
  restart: on-failure
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 5s
    timeout: 3s
    start_period: 30s
    retries: 3
  deploy:
    resources:
      limits:
        cpus: "1.5"
        memory: 384M

x-payment-service: &payment-service
  image: payment:latest
  command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 2 --loop uvloop app:app
  environment:
    - REDIS_MASTER_POOL_SIZE=768
  env_file:
    - env/payment_redis.env
  volumes:
    - ./common:/app/common:ro
    - ./orchestrator:/app/orchestrator:ro
    - ./lua:/app/lua:ro
  depends_on:
    cluster-init:
      condition: service_completed_successfully
    nats:
      condition: service_started
  restart: on-failure
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 5s
    timeout: 3s
    start_period: 30s
    retries: 3
  deploy:
    resources:
      limits:
        cpus: "1.5"
        memory: 384M

x-cluster-node: &cluster-node
  image: valkey/valkey:8.1-bookworm
  command: sh /etc/redis/cluster-node-entrypoint.sh
  volumes:
    - ./cluster-node-entrypoint.sh:/etc/redis/cluster-node-entrypoint.sh:ro
  healthcheck:
    test: ["CMD", "redis-cli", "-a", "redis", "--no-auth-warning", "ping"]
    interval: 5s
    timeout: 3s
    retries: 5

services:

  gateway:
    image: haproxy:3.0-bookworm
    volumes:
      - ./haproxy-medium.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8000:80"
    depends_on:
      order-service-1:
        condition: service_healthy
      order-service-2:
        condition: service_healthy
      order-service-3:
        condition: service_healthy
      order-service-4:
        condition: service_healthy
      stock-service-1:
        condition: service_healthy
      stock-service-2:
        condition: service_healthy
      stock-service-3:
        condition: service_healthy
      stock-service-4:
        condition: service_healthy
      payment-service-1:
        condition: service_healthy
      payment-service-2:
        condition: service_healthy
      payment-service-3:
        condition: service_healthy
      payment-service-4:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 256M

  # ---- Order Services (4 instances) ----

  order-service-1:
    <<: *order-service
    build: ./order
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=768

  order-service-2:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-2
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=768

  order-service-3:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-3
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=768

  order-service-4:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-4
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=768

  # ---- Stock Services (4 instances) ----

  stock-service-1:
    <<: *stock-service
    build: ./stock
    environment:
      - INSTANCE_ID=stock-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=768

  stock-service-2:
    <<: *stock-service
    environment:
      - INSTANCE_ID=stock-2
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=768

  stock-service-3:
    <<: *stock-service
    environment:
      - INSTANCE_ID=stock-3
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=768

  stock-service-4:
    <<: *stock-service
    environment:
      - INSTANCE_ID=stock-4
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=768

  # ---- Payment Services (4 instances) ----

  payment-service-1:
    <<: *payment-service
    build: ./payment
    environment:
      - INSTANCE_ID=payment-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=768

  payment-service-2:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-2
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=768

  payment-service-3:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-3
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=768

  payment-service-4:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-4
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=768

  # ---- Order Cluster (3 masters + 3 replicas) ----

  order-cluster-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=265mb
      - MAXCLIENTS=4096
      - IO_THREADS=4
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 350M

  order-cluster-2:
    <<: *cluster-node
    environment:
      - MAXMEMORY=265mb
      - MAXCLIENTS=4096
      - IO_THREADS=4
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 350M

  order-cluster-3:
    <<: *cluster-node
    environment:
      - MAXMEMORY=265mb
      - MAXCLIENTS=4096
      - IO_THREADS=4
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 350M

  order-cluster-replica-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=130mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 200M

  order-cluster-replica-2:
    <<: *cluster-node
    environment:
      - MAXMEMORY=130mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 200M

  order-cluster-replica-3:
    <<: *cluster-node
    environment:
      - MAXMEMORY=130mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 200M

  # ---- Stock Cluster (3 masters + 3 replicas) ----

  stock-cluster-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=130mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
      - MIN_REPLICAS_TO_WRITE=1
    deploy:
      resources:
        limits:
          cpus: "0.7"
          memory: 200M

  stock-cluster-2:
    <<: *cluster-node
    environment:
      - MAXMEMORY=130mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
      - MIN_REPLICAS_TO_WRITE=1
    deploy:
      resources:
        limits:
          cpus: "0.7"
          memory: 200M

  stock-cluster-3:
    <<: *cluster-node
    environment:
      - MAXMEMORY=130mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
      - MIN_REPLICAS_TO_WRITE=1
    deploy:
      resources:
        limits:
          cpus: "0.7"
          memory: 200M

  stock-cluster-replica-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=65mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 100M

  stock-cluster-replica-2:
    <<: *cluster-node
    environment:
      - MAXMEMORY=65mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 100M

  stock-cluster-replica-3:
    <<: *cluster-node
    environment:
      - MAXMEMORY=65mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 100M

  # ---- Payment Cluster (3 masters + 3 replicas) ----

  payment-cluster-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=130mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
      - MIN_REPLICAS_TO_WRITE=1
    deploy:
      resources:
        limits:
          cpus: "0.7"
          memory: 200M

  payment-cluster-2:
    <<: *cluster-node
    environment:
      - MAXMEMORY=130mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
      - MIN_REPLICAS_TO_WRITE=1
    deploy:
      resources:
        limits:
          cpus: "0.7"
          memory: 200M

  payment-cluster-3:
    <<: *cluster-node
    environment:
      - MAXMEMORY=130mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
      - MIN_REPLICAS_TO_WRITE=1
    deploy:
      resources:
        limits:
          cpus: "0.7"
          memory: 200M

  payment-cluster-replica-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=65mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 100M

  payment-cluster-replica-2:
    <<: *cluster-node
    environment:
      - MAXMEMORY=65mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 100M

  payment-cluster-replica-3:
    <<: *cluster-node
    environment:
      - MAXMEMORY=65mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 100M

  # ---- NATS ----

  nats:
    image: nats:2.11-alpine
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 128M

  # ---- Cluster Init (one-shot) ----

  cluster-init:
    image: valkey/valkey:8.1-bookworm
    command: sh /etc/redis/cluster-init.sh
    volumes:
      - ./cluster-init.sh:/etc/redis/cluster-init.sh:ro
    depends_on:
      order-cluster-1:
        condition: service_healthy
      order-cluster-2:
        condition: service_healthy
      order-cluster-3:
        condition: service_healthy
      order-cluster-replica-1:
        condition: service_healthy
      order-cluster-replica-2:
        condition: service_healthy
      order-cluster-replica-3:
        condition: service_healthy
      stock-cluster-1:
        condition: service_healthy
      stock-cluster-2:
        condition: service_healthy
      stock-cluster-3:
        condition: service_healthy
      stock-cluster-replica-1:
        condition: service_healthy
      stock-cluster-replica-2:
        condition: service_healthy
      stock-cluster-replica-3:
        condition: service_healthy
      payment-cluster-1:
        condition: service_healthy
      payment-cluster-2:
        condition: service_healthy
      payment-cluster-3:
        condition: service_healthy
      payment-cluster-replica-1:
        condition: service_healthy
      payment-cluster-replica-2:
        condition: service_healthy
      payment-cluster-replica-3:
        condition: service_healthy
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 64M
