# Medium cluster — ~34 CPU system budget
# System: ~34 CPU | reserve ~6 CPU for Locust + OS on a 40-core host
# App: 4 order + 4 stock + 4 payment instances, 2 Granian workers each
# Pool: order 256/128, stock+payment 128/64 per service

x-order-service: &order-service
  image: order:latest
  command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 2 --loop uvloop app:app
  environment:
    - REDIS_MASTER_POOL_SIZE=256
    - REDIS_REPLICA_POOL_SIZE=128
  env_file:
    - env/order_redis.env
  volumes:
    - ./common:/app/common:ro
    - ./orchestrator:/app/orchestrator:ro
    - ./lua:/app/lua:ro
  depends_on:
    order-db:
      condition: service_healthy
    order-db-replica:
      condition: service_healthy
    order-db-replica-2:
      condition: service_healthy
    nats:
      condition: service_started
    sentinel-1:
      condition: service_healthy
    sentinel-2:
      condition: service_healthy
    sentinel-3:
      condition: service_healthy
  restart: on-failure
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 5s
    timeout: 3s
    start_period: 20s
    retries: 6
  deploy:
    resources:
      limits:
        cpus: "2.5"
        memory: 512M

x-stock-service: &stock-service
  image: stock:latest
  command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 2 --loop uvloop app:app
  environment:
    - REDIS_MASTER_POOL_SIZE=128
    - REDIS_REPLICA_POOL_SIZE=64
  env_file:
    - env/stock_redis.env
  volumes:
    - ./common:/app/common:ro
    - ./orchestrator:/app/orchestrator:ro
    - ./lua:/app/lua:ro
  depends_on:
    stock-db:
      condition: service_healthy
    stock-db-replica:
      condition: service_healthy
    stock-db-replica-2:
      condition: service_healthy
    nats:
      condition: service_started
    sentinel-1:
      condition: service_healthy
    sentinel-2:
      condition: service_healthy
    sentinel-3:
      condition: service_healthy
  restart: on-failure
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 5s
    timeout: 3s
    start_period: 20s
    retries: 6
  deploy:
    resources:
      limits:
        cpus: "1.25"
        memory: 384M

x-payment-service: &payment-service
  image: payment:latest
  command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 2 --loop uvloop app:app
  environment:
    - REDIS_MASTER_POOL_SIZE=128
    - REDIS_REPLICA_POOL_SIZE=64
  env_file:
    - env/payment_redis.env
  volumes:
    - ./common:/app/common:ro
    - ./orchestrator:/app/orchestrator:ro
    - ./lua:/app/lua:ro
  depends_on:
    payment-db:
      condition: service_healthy
    payment-db-replica:
      condition: service_healthy
    payment-db-replica-2:
      condition: service_healthy
    nats:
      condition: service_started
    sentinel-1:
      condition: service_healthy
    sentinel-2:
      condition: service_healthy
    sentinel-3:
      condition: service_healthy
  restart: on-failure
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 5s
    timeout: 3s
    start_period: 20s
    retries: 6
  deploy:
    resources:
      limits:
        cpus: "1.25"
        memory: 384M

x-sentinel: &sentinel
  image: valkey/valkey:8.1-bookworm
  command: sh /etc/redis/sentinel-entrypoint.sh
  volumes:
    - ./sentinel-entrypoint.sh:/etc/redis/sentinel-entrypoint.sh:ro
  depends_on:
    order-db:
      condition: service_healthy
    order-db-replica:
      condition: service_healthy
    order-db-replica-2:
      condition: service_healthy
    stock-db:
      condition: service_healthy
    stock-db-replica:
      condition: service_healthy
    stock-db-replica-2:
      condition: service_healthy
    payment-db:
      condition: service_healthy
    payment-db-replica:
      condition: service_healthy
    payment-db-replica-2:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "redis-cli", "-p", "26379", "ping"]
    interval: 5s
    timeout: 3s
    retries: 10
    start_period: 5s
  deploy:
    resources:
      limits:
        cpus: "0.3"
        memory: 64M

services:

  gateway:
    image: haproxy:3.0-bookworm
    volumes:
      - ./haproxy-medium.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8000:80"
    depends_on:
      order-service-1:
        condition: service_healthy
      order-service-2:
        condition: service_healthy
      order-service-3:
        condition: service_healthy
      order-service-4:
        condition: service_healthy
      stock-service-1:
        condition: service_healthy
      stock-service-2:
        condition: service_healthy
      stock-service-3:
        condition: service_healthy
      stock-service-4:
        condition: service_healthy
      payment-service-1:
        condition: service_healthy
      payment-service-2:
        condition: service_healthy
      payment-service-3:
        condition: service_healthy
      payment-service-4:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 256M

  # ---- Order Services (4 instances) ----

  order-service-1:
    <<: *order-service
    build: ./order
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=256
      - REDIS_REPLICA_POOL_SIZE=128

  order-service-2:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-2
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=256
      - REDIS_REPLICA_POOL_SIZE=128

  order-service-3:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-3
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=256
      - REDIS_REPLICA_POOL_SIZE=128

  order-service-4:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-4
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=256
      - REDIS_REPLICA_POOL_SIZE=128

  # ---- Stock Services (4 instances) ----

  stock-service-1:
    <<: *stock-service
    build: ./stock
    environment:
      - INSTANCE_ID=stock-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=128
      - REDIS_REPLICA_POOL_SIZE=64

  stock-service-2:
    <<: *stock-service
    environment:
      - INSTANCE_ID=stock-2
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=128
      - REDIS_REPLICA_POOL_SIZE=64

  stock-service-3:
    <<: *stock-service
    environment:
      - INSTANCE_ID=stock-3
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=128
      - REDIS_REPLICA_POOL_SIZE=64

  stock-service-4:
    <<: *stock-service
    environment:
      - INSTANCE_ID=stock-4
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=128
      - REDIS_REPLICA_POOL_SIZE=64

  # ---- Payment Services (4 instances) ----

  payment-service-1:
    <<: *payment-service
    build: ./payment
    environment:
      - INSTANCE_ID=payment-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=128
      - REDIS_REPLICA_POOL_SIZE=64

  payment-service-2:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-2
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=128
      - REDIS_REPLICA_POOL_SIZE=64

  payment-service-3:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-3
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=128
      - REDIS_REPLICA_POOL_SIZE=64

  payment-service-4:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-4
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=128
      - REDIS_REPLICA_POOL_SIZE=64

  # ---- Redis Masters ----

  order-db:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --masterauth redis
        --maxmemory 800mb
        --maxclients 30000
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "3.0"

  stock-db:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --masterauth redis
        --maxmemory 512mb
        --maxclients 30000
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"

  payment-db:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --masterauth redis
        --maxmemory 512mb
        --maxclients 30000
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"

  # ---- Redis Replicas ----

  order-db-replica:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 400mb
        --replicaof order-db:6379
        --masterauth redis
        --maxclients 30000
    depends_on:
      order-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.75"

  order-db-replica-2:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 400mb
        --replicaof order-db:6379
        --masterauth redis
        --maxclients 30000
    depends_on:
      order-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.75"

  stock-db-replica:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof stock-db:6379
        --masterauth redis
        --maxclients 30000
    depends_on:
      stock-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"

  stock-db-replica-2:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof stock-db:6379
        --masterauth redis
        --maxclients 30000
    depends_on:
      stock-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"

  payment-db-replica:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof payment-db:6379
        --masterauth redis
        --maxclients 30000
    depends_on:
      payment-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"

  payment-db-replica-2:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof payment-db:6379
        --masterauth redis
        --maxclients 30000
    depends_on:
      payment-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"

  # ---- NATS ----

  nats:
    image: nats:2.11-alpine
    command: ["-js"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 128M

  # ---- Sentinel Nodes ----

  sentinel-1:
    <<: *sentinel

  sentinel-2:
    <<: *sentinel

  sentinel-3:
    <<: *sentinel
