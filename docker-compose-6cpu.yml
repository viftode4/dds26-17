# 6 CPU / 8 GB local configuration
# Same scaling structure as medium/large (multiple instances, leastconn, NATS queue groups)
# Use this to validate the horizontal scaling approach before deploying to 50/90 CPU clusters.

x-order-service: &order-service
  image: order:latest
  command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 1 --loop uvloop app:app
  environment:
    - REDIS_MASTER_POOL_SIZE=1024
  env_file:
    - env/order_redis.env
  volumes:
    - ./common:/app/common:ro
    - ./orchestrator:/app/orchestrator:ro
    - ./lua:/app/lua:ro
  depends_on:
    cluster-init:
      condition: service_completed_successfully
    nats:
      condition: service_started
  restart: on-failure
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 5s
    timeout: 3s
    start_period: 30s
    retries: 3
  deploy:
    resources:
      limits:
        cpus: "0.65"
        memory: 512M

x-stock-service: &stock-service
  image: stock:latest
  command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 1 --loop uvloop app:app
  environment:
    - REDIS_MASTER_POOL_SIZE=1024
  env_file:
    - env/stock_redis.env
  volumes:
    - ./common:/app/common:ro
    - ./orchestrator:/app/orchestrator:ro
    - ./lua:/app/lua:ro
  depends_on:
    cluster-init:
      condition: service_completed_successfully
    nats:
      condition: service_started
  restart: on-failure
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 5s
    timeout: 3s
    start_period: 30s
    retries: 3
  deploy:
    resources:
      limits:
        cpus: "0.35"
        memory: 384M

x-payment-service: &payment-service
  image: payment:latest
  command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 1 --loop uvloop app:app
  environment:
    - REDIS_MASTER_POOL_SIZE=1024
  env_file:
    - env/payment_redis.env
  volumes:
    - ./common:/app/common:ro
    - ./orchestrator:/app/orchestrator:ro
    - ./lua:/app/lua:ro
  depends_on:
    cluster-init:
      condition: service_completed_successfully
    nats:
      condition: service_started
  restart: on-failure
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 5s
    timeout: 3s
    start_period: 30s
    retries: 3
  deploy:
    resources:
      limits:
        cpus: "0.35"
        memory: 384M

x-cluster-node: &cluster-node
  image: valkey/valkey:8.1-bookworm
  command: sh /etc/redis/cluster-node-entrypoint.sh
  volumes:
    - ./cluster-node-entrypoint.sh:/etc/redis/cluster-node-entrypoint.sh:ro
  healthcheck:
    test: ["CMD", "redis-cli", "-a", "redis", "--no-auth-warning", "ping"]
    interval: 5s
    timeout: 3s
    retries: 5

services:

  gateway:
    image: haproxy:3.0-bookworm
    volumes:
      - ./haproxy-6cpu.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8000:80"
    depends_on:
      order-service-1:
        condition: service_healthy
      order-service-2:
        condition: service_healthy
      stock-service-1:
        condition: service_healthy
      stock-service-2:
        condition: service_healthy
      payment-service-1:
        condition: service_healthy
      payment-service-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 512M

  # ---- Order Services (2 instances) ----

  order-service-1:
    <<: *order-service
    build: ./order
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-1
      - NATS_URL=nats://nats:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - REDIS_MASTER_POOL_SIZE=1024

  order-service-2:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-2
      - NATS_URL=nats://nats:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - REDIS_MASTER_POOL_SIZE=1024

  # ---- Stock Services (2 instances) ----

  stock-service-1:
    <<: *stock-service
    build: ./stock
    environment:
      - INSTANCE_ID=stock-1
      - NATS_URL=nats://nats:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - REDIS_MASTER_POOL_SIZE=1024

  stock-service-2:
    <<: *stock-service
    environment:
      - INSTANCE_ID=stock-2
      - NATS_URL=nats://nats:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - REDIS_MASTER_POOL_SIZE=1024

  # ---- Payment Services (2 instances) ----

  payment-service-1:
    <<: *payment-service
    build: ./payment
    environment:
      - INSTANCE_ID=payment-1
      - NATS_URL=nats://nats:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - REDIS_MASTER_POOL_SIZE=1024

  payment-service-2:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-2
      - NATS_URL=nats://nats:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - REDIS_MASTER_POOL_SIZE=1024

  # ---- Order Cluster (3 masters + 3 replicas) ----

  order-cluster-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=100mb
      - MAXCLIENTS=2048
      - IO_THREADS=2
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 150M

  order-cluster-2:
    <<: *cluster-node
    environment:
      - MAXMEMORY=100mb
      - MAXCLIENTS=2048
      - IO_THREADS=2
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 150M

  order-cluster-3:
    <<: *cluster-node
    environment:
      - MAXMEMORY=100mb
      - MAXCLIENTS=2048
      - IO_THREADS=2
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 150M

  order-cluster-replica-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=50mb
      - MAXCLIENTS=2048
      - IO_THREADS=1
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 90M

  order-cluster-replica-2:
    <<: *cluster-node
    environment:
      - MAXMEMORY=50mb
      - MAXCLIENTS=2048
      - IO_THREADS=1
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 90M

  order-cluster-replica-3:
    <<: *cluster-node
    environment:
      - MAXMEMORY=50mb
      - MAXCLIENTS=2048
      - IO_THREADS=1
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 90M

  # ---- Stock Cluster (3 masters + 3 replicas) ----

  stock-cluster-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=75mb
      - MAXCLIENTS=2048
      - IO_THREADS=1
      - MIN_REPLICAS_TO_WRITE=1
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 110M

  stock-cluster-2:
    <<: *cluster-node
    environment:
      - MAXMEMORY=75mb
      - MAXCLIENTS=2048
      - IO_THREADS=1
      - MIN_REPLICAS_TO_WRITE=1
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 110M

  stock-cluster-3:
    <<: *cluster-node
    environment:
      - MAXMEMORY=75mb
      - MAXCLIENTS=2048
      - IO_THREADS=1
      - MIN_REPLICAS_TO_WRITE=1
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 110M

  stock-cluster-replica-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=40mb
      - MAXCLIENTS=2048
      - IO_THREADS=1
    deploy:
      resources:
        limits:
          cpus: "0.12"
          memory: 70M

  stock-cluster-replica-2:
    <<: *cluster-node
    environment:
      - MAXMEMORY=40mb
      - MAXCLIENTS=2048
      - IO_THREADS=1
    deploy:
      resources:
        limits:
          cpus: "0.12"
          memory: 70M

  stock-cluster-replica-3:
    <<: *cluster-node
    environment:
      - MAXMEMORY=40mb
      - MAXCLIENTS=2048
      - IO_THREADS=1
    deploy:
      resources:
        limits:
          cpus: "0.12"
          memory: 70M

  # ---- Payment Cluster (3 masters + 3 replicas) ----

  payment-cluster-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=75mb
      - MAXCLIENTS=2048
      - IO_THREADS=1
      - MIN_REPLICAS_TO_WRITE=1
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 110M

  payment-cluster-2:
    <<: *cluster-node
    environment:
      - MAXMEMORY=75mb
      - MAXCLIENTS=2048
      - IO_THREADS=1
      - MIN_REPLICAS_TO_WRITE=1
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 110M

  payment-cluster-3:
    <<: *cluster-node
    environment:
      - MAXMEMORY=75mb
      - MAXCLIENTS=2048
      - IO_THREADS=1
      - MIN_REPLICAS_TO_WRITE=1
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 110M

  payment-cluster-replica-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=40mb
      - MAXCLIENTS=2048
      - IO_THREADS=1
    deploy:
      resources:
        limits:
          cpus: "0.12"
          memory: 70M

  payment-cluster-replica-2:
    <<: *cluster-node
    environment:
      - MAXMEMORY=40mb
      - MAXCLIENTS=2048
      - IO_THREADS=1
    deploy:
      resources:
        limits:
          cpus: "0.12"
          memory: 70M

  payment-cluster-replica-3:
    <<: *cluster-node
    environment:
      - MAXMEMORY=40mb
      - MAXCLIENTS=2048
      - IO_THREADS=1
    deploy:
      resources:
        limits:
          cpus: "0.12"
          memory: 70M

  # ---- NATS ----

  nats:
    image: nats:2.11-alpine
    command: ["-js", "-m", "8222"]
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 64M

  # ---- Cluster Init (one-shot) ----

  cluster-init:
    image: valkey/valkey:8.1-bookworm
    command: sh /etc/redis/cluster-init.sh
    volumes:
      - ./cluster-init.sh:/etc/redis/cluster-init.sh:ro
    depends_on:
      order-cluster-1:
        condition: service_healthy
      order-cluster-2:
        condition: service_healthy
      order-cluster-3:
        condition: service_healthy
      order-cluster-replica-1:
        condition: service_healthy
      order-cluster-replica-2:
        condition: service_healthy
      order-cluster-replica-3:
        condition: service_healthy
      stock-cluster-1:
        condition: service_healthy
      stock-cluster-2:
        condition: service_healthy
      stock-cluster-3:
        condition: service_healthy
      stock-cluster-replica-1:
        condition: service_healthy
      stock-cluster-replica-2:
        condition: service_healthy
      stock-cluster-replica-3:
        condition: service_healthy
      payment-cluster-1:
        condition: service_healthy
      payment-cluster-2:
        condition: service_healthy
      payment-cluster-3:
        condition: service_healthy
      payment-cluster-replica-1:
        condition: service_healthy
      payment-cluster-replica-2:
        condition: service_healthy
      payment-cluster-replica-3:
        condition: service_healthy
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 64M

  # ---- Observability ----

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
