services:

  gateway:
    image: haproxy:3.0-bookworm
    volumes:
      - ./haproxy-small.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8000:80"
    depends_on:
      order-service-1:
        condition: service_healthy
      stock-service-1:
        condition: service_healthy
      payment-service-1:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ---- Application Services (1 instance each) ----

  order-service-1:
    build: ./order
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-1
      - NATS_URL=nats://nats:4222
    command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 1 --loop uvloop app:app
    env_file:
      - env/order_redis.env
    volumes:
      - ./common:/app/common:ro
      - ./orchestrator:/app/orchestrator:ro
      - ./lua:/app/lua:ro
    depends_on:
      order-db:
        condition: service_started
      order-db-replica:
        condition: service_started
      nats:
        condition: service_started
      sentinel-1:
        condition: service_started
      sentinel-2:
        condition: service_started
      sentinel-3:
        condition: service_started
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  stock-service-1:
    build: ./stock
    image: stock:latest
    environment:
      - INSTANCE_ID=stock-1
      - NATS_URL=nats://nats:4222
    command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 1 --loop uvloop app:app
    env_file:
      - env/stock_redis.env
    volumes:
      - ./common:/app/common:ro
      - ./orchestrator:/app/orchestrator:ro
      - ./lua:/app/lua:ro
    depends_on:
      stock-db:
        condition: service_started
      stock-db-replica:
        condition: service_started
      nats:
        condition: service_started
      sentinel-1:
        condition: service_started
      sentinel-2:
        condition: service_started
      sentinel-3:
        condition: service_started
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

  payment-service-1:
    build: ./payment
    image: payment:latest
    environment:
      - INSTANCE_ID=payment-1
      - NATS_URL=nats://nats:4222
    command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 1 --loop uvloop app:app
    env_file:
      - env/payment_redis.env
    volumes:
      - ./common:/app/common:ro
      - ./orchestrator:/app/orchestrator:ro
      - ./lua:/app/lua:ro
    depends_on:
      payment-db:
        condition: service_started
      payment-db-replica:
        condition: service_started
      nats:
        condition: service_started
      sentinel-1:
        condition: service_started
      sentinel-2:
        condition: service_started
      sentinel-3:
        condition: service_started
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

  # ---- Redis Masters ----

  order-db:
    image: valkey/valkey:8.1-bookworm
    command: >
      redis-server
        --requirepass redis
        --masterauth redis
        --maxmemory 200mb
        --appendonly yes
        --appendfsync everysec
        --io-threads 2
        --io-threads-do-reads yes
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  stock-db:
    image: valkey/valkey:8.1-bookworm
    command: >
      redis-server
        --requirepass redis
        --masterauth redis
        --maxmemory 100mb
        --appendonly yes
        --appendfsync everysec
        --io-threads 1
        --io-threads-do-reads yes
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 128M

  payment-db:
    image: valkey/valkey:8.1-bookworm
    command: >
      redis-server
        --requirepass redis
        --masterauth redis
        --maxmemory 100mb
        --appendonly yes
        --appendfsync everysec
        --io-threads 1
        --io-threads-do-reads yes
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 128M

  # ---- Redis Replicas ----

  order-db-replica:
    image: valkey/valkey:8.1-bookworm
    command: >
      redis-server
        --requirepass redis
        --maxmemory 100mb
        --replicaof order-db 6379
        --masterauth redis
    depends_on:
      order-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M

  stock-db-replica:
    image: valkey/valkey:8.1-bookworm
    command: >
      redis-server
        --requirepass redis
        --maxmemory 100mb
        --replicaof stock-db 6379
        --masterauth redis
    depends_on:
      stock-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M

  payment-db-replica:
    image: valkey/valkey:8.1-bookworm
    command: >
      redis-server
        --requirepass redis
        --maxmemory 100mb
        --replicaof payment-db 6379
        --masterauth redis
    depends_on:
      payment-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M

  # ---- NATS ----

  nats:
    image: nats:2.11-alpine
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  # ---- Sentinel Nodes ----

  sentinel-1:
    image: valkey/valkey:8.1-bookworm
    command: sh /etc/redis/sentinel-entrypoint.sh
    volumes:
      - ./sentinel-entrypoint.sh:/etc/redis/sentinel-entrypoint.sh:ro
    depends_on:
      order-db:
        condition: service_started
      order-db-replica:
        condition: service_started
      stock-db:
        condition: service_started
      stock-db-replica:
        condition: service_started
      payment-db:
        condition: service_started
      payment-db-replica:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 64M

  sentinel-2:
    image: valkey/valkey:8.1-bookworm
    command: sh /etc/redis/sentinel-entrypoint.sh
    volumes:
      - ./sentinel-entrypoint.sh:/etc/redis/sentinel-entrypoint.sh:ro
    depends_on:
      order-db:
        condition: service_started
      order-db-replica:
        condition: service_started
      stock-db:
        condition: service_started
      stock-db-replica:
        condition: service_started
      payment-db:
        condition: service_started
      payment-db-replica:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 64M

  sentinel-3:
    image: valkey/valkey:8.1-bookworm
    command: sh /etc/redis/sentinel-entrypoint.sh
    volumes:
      - ./sentinel-entrypoint.sh:/etc/redis/sentinel-entrypoint.sh:ro
    depends_on:
      order-db:
        condition: service_started
      order-db-replica:
        condition: service_started
      stock-db:
        condition: service_started
      stock-db-replica:
        condition: service_started
      payment-db:
        condition: service_started
      payment-db-replica:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 64M
