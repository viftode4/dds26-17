services:

  gateway:
    image: haproxy:3.0-bookworm
    volumes:
      - ./haproxy-small.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8000:80"
    depends_on:
      order-service-1:
        condition: service_healthy
      stock-service-1:
        condition: service_healthy
      payment-service-1:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ---- Application Services (1 instance each) ----

  order-service-1:
    build: ./order
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=128
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 3 --loop uvloop app:app
    env_file:
      - env/order_redis.env
    volumes:
      - ./common:/app/common:ro
      - ./orchestrator:/app/orchestrator:ro
      - ./lua:/app/lua:ro
    depends_on:
      cluster-init:
        condition: service_completed_successfully
      nats:
        condition: service_started
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "3.5"
          memory: 1024M

  stock-service-1:
    build: ./stock
    image: stock:latest
    environment:
      - INSTANCE_ID=stock-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=2048
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 1 --loop uvloop app:app
    env_file:
      - env/stock_redis.env
    volumes:
      - ./common:/app/common:ro
      - ./orchestrator:/app/orchestrator:ro
      - ./lua:/app/lua:ro
    depends_on:
      cluster-init:
        condition: service_completed_successfully
      nats:
        condition: service_started
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  payment-service-1:
    build: ./payment
    image: payment:latest
    environment:
      - INSTANCE_ID=payment-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=2048
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 1 --loop uvloop app:app
    env_file:
      - env/payment_redis.env
    volumes:
      - ./common:/app/common:ro
      - ./orchestrator:/app/orchestrator:ro
      - ./lua:/app/lua:ro
    depends_on:
      cluster-init:
        condition: service_completed_successfully
      nats:
        condition: service_started
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ---- Order Cluster (3 masters + 3 replicas) ----

  order-cluster-1:
    image: valkey/valkey:8.1-bookworm
    command: sh /etc/redis/cluster-node-entrypoint.sh
    environment:
      - MAXMEMORY=130mb
      - MAXCLIENTS=4096
      - IO_THREADS=4
    volumes:
      - ./cluster-node-entrypoint.sh:/etc/redis/cluster-node-entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "redis", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 200M

  order-cluster-2:
