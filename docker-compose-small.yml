      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 80M

  # ---- NATS ----

  nats:
    image: nats:2.11-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ---- Cluster Init (one-shot) ----

  cluster-init:
    image: valkey/valkey:8.1-bookworm
    command: sh /etc/redis/cluster-init.sh
    volumes:
      - ./cluster-init.sh:/etc/redis/cluster-init.sh:ro
    depends_on:
      order-cluster-1:
        condition: service_healthy
      order-cluster-2:
        condition: service_healthy
      order-cluster-3:
        condition: service_healthy
      order-cluster-replica-1:
        condition: service_healthy
      order-cluster-replica-2:
        condition: service_healthy
      order-cluster-replica-3:
        condition: service_healthy
      stock-cluster-1:
        condition: service_healthy
      stock-cluster-2:
        condition: service_healthy
      stock-cluster-3:
        condition: service_healthy
      stock-cluster-replica-1:
        condition: service_healthy
      stock-cluster-replica-2:
        condition: service_healthy
      stock-cluster-replica-3:
        condition: service_healthy
      payment-cluster-1:
        condition: service_healthy
      payment-cluster-2:
        condition: service_healthy
      payment-cluster-3:
        condition: service_healthy
      payment-cluster-replica-1:
        condition: service_healthy
      payment-cluster-replica-2:
        condition: service_healthy
      payment-cluster-replica-3:
        condition: service_healthy
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 64M

  # ---- Observability ----

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
