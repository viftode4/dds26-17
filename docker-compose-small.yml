# Small cluster — ~15 CPU system budget
# Target host: 16-20 CPU if Locust shares the machine
# App: 1 order (3 workers) + 1 stock (1 worker) + 1 payment (1 worker)
# Pool: order 512/256, stock+payment 256/128

services:

  gateway:
    image: haproxy:3.0-bookworm
    volumes:
      - ./haproxy-small.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8000:80"
    depends_on:
      order-service-1:
        condition: service_healthy
      stock-service-1:
        condition: service_healthy
      payment-service-1:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  # ---- Application Services (1 instance each) ----

  order-service-1:
    build: ./order
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 3 --loop uvloop app:app
    env_file:
      - env/order_redis.env
    volumes:
      - ./common:/app/common:ro
      - ./orchestrator:/app/orchestrator:ro
      - ./lua:/app/lua:ro
    depends_on:
      order-db:
        condition: service_healthy
      order-db-replica:
        condition: service_healthy
      order-db-replica-2:
        condition: service_healthy
      order-db-replica-3:
        condition: service_healthy
      nats:
        condition: service_started
      sentinel-1:
        condition: service_started
      sentinel-2:
        condition: service_started
      sentinel-3:
        condition: service_started
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "5.0"
          memory: 1024M

  stock-service-1:
    build: ./stock
    image: stock:latest
    environment:
      - INSTANCE_ID=stock-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=256
      - REDIS_REPLICA_POOL_SIZE=128
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 1 --loop uvloop app:app
    env_file:
      - env/stock_redis.env
    volumes:
      - ./common:/app/common:ro
      - ./orchestrator:/app/orchestrator:ro
      - ./lua:/app/lua:ro
    depends_on:
      stock-db:
        condition: service_healthy
      stock-db-replica:
        condition: service_healthy
      stock-db-replica-2:
        condition: service_healthy
      stock-db-replica-3:
        condition: service_healthy
      nats:
        condition: service_started
      sentinel-1:
        condition: service_started
      sentinel-2:
        condition: service_started
      sentinel-3:
        condition: service_started
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  payment-service-1:
    build: ./payment
    image: payment:latest
    environment:
      - INSTANCE_ID=payment-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=256
      - REDIS_REPLICA_POOL_SIZE=128
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 1 --loop uvloop app:app
    env_file:
      - env/payment_redis.env
    volumes:
      - ./common:/app/common:ro
      - ./orchestrator:/app/orchestrator:ro
      - ./lua:/app/lua:ro
    depends_on:
      payment-db:
        condition: service_healthy
      payment-db-replica:
        condition: service_healthy
      payment-db-replica-2:
        condition: service_healthy
      payment-db-replica-3:
        condition: service_healthy
      nats:
        condition: service_started
      sentinel-1:
        condition: service_started
      sentinel-2:
        condition: service_started
      sentinel-3:
        condition: service_started
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  # ---- Redis Masters ----

  order-db:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --masterauth redis
        --maxmemory 512mb
        --maxclients 30000
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"

  stock-db:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --masterauth redis
        --maxmemory 300mb
        --maxclients 100000
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"

  payment-db:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --masterauth redis
        --maxmemory 300mb
        --maxclients 100000
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"

  # ---- Redis Replicas ----

  order-db-replica:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof order-db:6379
        --masterauth redis
        --maxclients 100000
    depends_on:
      order-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.6"

  order-db-replica-2:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof order-db:6379
        --masterauth redis
        --maxclients 100000
    depends_on:
      order-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.3"

  order-db-replica-3:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof order-db:6379
        --masterauth redis
        --maxclients 100000
    depends_on:
      order-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.3"

  stock-db-replica:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof stock-db:6379
        --masterauth redis
        --maxclients 10000
    depends_on:
      stock-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.2"

  stock-db-replica-2:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof stock-db:6379
        --masterauth redis
        --maxclients 10000
    depends_on:
      stock-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.2"

  stock-db-replica-3:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof stock-db:6379
        --masterauth redis
        --maxclients 10000
    depends_on:
      stock-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.2"

  payment-db-replica:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof payment-db:6379
        --masterauth redis
        --maxclients 10000
    depends_on:
      payment-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.2"

  payment-db-replica-2:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof payment-db:6379
        --masterauth redis
        --maxclients 10000
    depends_on:
      payment-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.2"

  payment-db-replica-3:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof payment-db:6379
        --masterauth redis
        --maxclients 10000
    depends_on:
      payment-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.2"

  # ---- NATS ----

  nats:
    image: nats:2.11-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 128M

  # ---- Sentinel Nodes ----

  sentinel-1:
    image: valkey/valkey:8.1-bookworm
    command: sh /etc/redis/sentinel-entrypoint.sh
    volumes:
      - ./sentinel-entrypoint.sh:/etc/redis/sentinel-entrypoint.sh:ro
    depends_on:
      order-db:
        condition: service_healthy
      order-db-replica:
        condition: service_healthy
      order-db-replica-2:
        condition: service_healthy
      order-db-replica-3:
        condition: service_healthy
      stock-db:
        condition: service_healthy
      stock-db-replica:
        condition: service_healthy
      stock-db-replica-2:
        condition: service_healthy
      stock-db-replica-3:
        condition: service_healthy
      payment-db:
        condition: service_healthy
      payment-db-replica:
        condition: service_healthy
      payment-db-replica-2:
        condition: service_healthy
      payment-db-replica-3:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M

  sentinel-2:
    image: valkey/valkey:8.1-bookworm
    command: sh /etc/redis/sentinel-entrypoint.sh
    volumes:
      - ./sentinel-entrypoint.sh:/etc/redis/sentinel-entrypoint.sh:ro
    depends_on:
      order-db:
        condition: service_healthy
      order-db-replica:
        condition: service_healthy
      order-db-replica-2:
        condition: service_healthy
      order-db-replica-3:
        condition: service_healthy
      stock-db:
        condition: service_healthy
      stock-db-replica:
        condition: service_healthy
      stock-db-replica-2:
        condition: service_healthy
      stock-db-replica-3:
        condition: service_healthy
      payment-db:
        condition: service_healthy
      payment-db-replica:
        condition: service_healthy
      payment-db-replica-2:
        condition: service_healthy
      payment-db-replica-3:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M

  sentinel-3:
    image: valkey/valkey:8.1-bookworm
    command: sh /etc/redis/sentinel-entrypoint.sh
    volumes:
      - ./sentinel-entrypoint.sh:/etc/redis/sentinel-entrypoint.sh:ro
    depends_on:
      order-db:
        condition: service_healthy
      order-db-replica:
        condition: service_healthy
      order-db-replica-2:
        condition: service_healthy
      order-db-replica-3:
        condition: service_healthy
      stock-db:
        condition: service_healthy
      stock-db-replica:
        condition: service_healthy
      stock-db-replica-2:
        condition: service_healthy
      stock-db-replica-3:
        condition: service_healthy
      payment-db:
        condition: service_healthy
      payment-db-replica:
        condition: service_healthy
      payment-db-replica-2:
        condition: service_healthy
      payment-db-replica-3:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M

  # ---- Observability ----

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
