# Large cluster — ~90 CPU total
# System: ~80 CPU | Locust: ~10 CPU
# App: 9 order (3 workers) + 7 stock (2 workers) + 7 payment (2 workers) instances
# Pool: 512 master / 256 replica per instance (27 order processes, 14 stock, 14 payment)

x-order-service: &order-service
  image: order:latest
  command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 3 --loop uvloop app:app
  environment:
    - REDIS_MASTER_POOL_SIZE=4096
    - REDIS_REPLICA_POOL_SIZE=2048
  env_file:
    - env/order_redis.env
  volumes:
    - ./common:/app/common:ro
    - ./orchestrator:/app/orchestrator:ro
    - ./lua:/app/lua:ro
  depends_on:
    order-db:
      condition: service_started
    order-db-replica:
      condition: service_started
    order-db-replica-2:
      condition: service_started
    nats:
      condition: service_started
    sentinel-1:
      condition: service_started
    sentinel-2:
      condition: service_started
    sentinel-3:
      condition: service_started
  restart: on-failure
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 5s
    timeout: 3s
    start_period: 10s
    retries: 3
  deploy:
    resources:
      limits:
        cpus: "3.0"
        memory: 512M

x-stock-service: &stock-service
  image: stock:latest
  command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 2 --loop uvloop app:app
  environment:
    - REDIS_MASTER_POOL_SIZE=512
    - REDIS_REPLICA_POOL_SIZE=256
  env_file:
    - env/stock_redis.env
  volumes:
    - ./common:/app/common:ro
    - ./orchestrator:/app/orchestrator:ro
    - ./lua:/app/lua:ro
  depends_on:
    stock-db:
      condition: service_started
    stock-db-replica:
      condition: service_started
    stock-db-replica-2:
      condition: service_started
    nats:
      condition: service_started
    sentinel-1:
      condition: service_started
    sentinel-2:
      condition: service_started
    sentinel-3:
      condition: service_started
  restart: on-failure
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 5s
    timeout: 3s
    start_period: 10s
    retries: 3
  deploy:
    resources:
      limits:
        cpus: "2.0"
        memory: 384M

x-payment-service: &payment-service
  image: payment:latest
  command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 2 --loop uvloop app:app
  environment:
    - REDIS_MASTER_POOL_SIZE=512
    - REDIS_REPLICA_POOL_SIZE=256
  env_file:
    - env/payment_redis.env
  volumes:
    - ./common:/app/common:ro
    - ./orchestrator:/app/orchestrator:ro
    - ./lua:/app/lua:ro
  depends_on:
    payment-db:
      condition: service_started
    payment-db-replica:
      condition: service_started
    payment-db-replica-2:
      condition: service_started
    nats:
      condition: service_started
    sentinel-1:
      condition: service_started
    sentinel-2:
      condition: service_started
    sentinel-3:
      condition: service_started
  restart: on-failure
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 5s
    timeout: 3s
    start_period: 10s
    retries: 3
  deploy:
    resources:
      limits:
        cpus: "2.0"
        memory: 384M

x-sentinel: &sentinel
  image: valkey/valkey:8.1-bookworm
  command: sh /etc/redis/sentinel-entrypoint.sh
  volumes:
    - ./sentinel-entrypoint.sh:/etc/redis/sentinel-entrypoint.sh:ro
  depends_on:
    order-db:
      condition: service_started
    order-db-replica:
      condition: service_started
    order-db-replica-2:
      condition: service_started
    stock-db:
      condition: service_started
    stock-db-replica:
      condition: service_started
    stock-db-replica-2:
      condition: service_started
    payment-db:
      condition: service_started
    payment-db-replica:
      condition: service_started
    payment-db-replica-2:
      condition: service_started
  deploy:
    resources:
      limits:
        cpus: "0.3"
        memory: 64M

services:

  gateway:
    image: haproxy:3.0-bookworm
    volumes:
      - ./haproxy-large.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8000:80"
    depends_on:
      order-service-1:
        condition: service_healthy
      order-service-2:
        condition: service_healthy
      order-service-3:
        condition: service_healthy
      order-service-4:
        condition: service_healthy
      order-service-5:
        condition: service_healthy
      order-service-6:
        condition: service_healthy
      order-service-7:
        condition: service_healthy
      order-service-8:
        condition: service_healthy
      order-service-9:
        condition: service_healthy
      stock-service-1:
        condition: service_healthy
      stock-service-2:
        condition: service_healthy
      stock-service-3:
        condition: service_healthy
      stock-service-4:
        condition: service_healthy
      stock-service-5:
        condition: service_healthy
      stock-service-6:
        condition: service_healthy
      stock-service-7:
        condition: service_healthy
      payment-service-1:
        condition: service_healthy
      payment-service-2:
        condition: service_healthy
      payment-service-3:
        condition: service_healthy
      payment-service-4:
        condition: service_healthy
      payment-service-5:
        condition: service_healthy
      payment-service-6:
        condition: service_healthy
      payment-service-7:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 512M

  # ---- Order Services (9 instances, 3 Granian workers each) ----

  order-service-1:
    <<: *order-service
    build: ./order
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  order-service-2:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-2
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  order-service-3:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-3
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  order-service-4:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-4
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  order-service-5:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-5
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  order-service-6:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-6
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  order-service-7:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-7
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  order-service-8:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-8
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  order-service-9:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-9
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  # ---- Stock Services (7 instances, 2 Granian workers each) ----

  stock-service-1:
    <<: *stock-service
    build: ./stock
    environment:
      - INSTANCE_ID=stock-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  stock-service-2:
    <<: *stock-service
    environment:
      - INSTANCE_ID=stock-2
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  stock-service-3:
    <<: *stock-service
    environment:
      - INSTANCE_ID=stock-3
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  stock-service-4:
    <<: *stock-service
    environment:
      - INSTANCE_ID=stock-4
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  stock-service-5:
    <<: *stock-service
    environment:
      - INSTANCE_ID=stock-5
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  stock-service-6:
    <<: *stock-service
    environment:
      - INSTANCE_ID=stock-6
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  stock-service-7:
    <<: *stock-service
    environment:
      - INSTANCE_ID=stock-7
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  # ---- Payment Services (7 instances, 2 Granian workers each) ----

  payment-service-1:
    <<: *payment-service
    build: ./payment
    environment:
      - INSTANCE_ID=payment-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  payment-service-2:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-2
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  payment-service-3:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-3
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  payment-service-4:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-4
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  payment-service-5:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-5
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  payment-service-6:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-6
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  payment-service-7:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-7
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512
      - REDIS_REPLICA_POOL_SIZE=256

  # ---- Redis Masters ----

  order-db:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --masterauth redis
        --maxmemory 1600mb
        --maxclients 16384
    deploy:
      resources:
        limits:
          cpus: "6.0"
          memory: 2G

  stock-db:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --masterauth redis
        --maxmemory 600mb
        --maxclients 8192
        --min-replicas-to-write 1
        --min-replicas-max-lag 10
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 768M

  payment-db:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --masterauth redis
        --maxmemory 600mb
        --maxclients 8192
        --min-replicas-to-write 1
        --min-replicas-max-lag 10
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 768M

  # ---- Redis Replicas ----

  order-db-replica:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 800mb
        --replicaof order-db 6379
        --masterauth redis
        --maxclients 8192
    depends_on:
      order-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G

  order-db-replica-2:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 800mb
        --replicaof order-db 6379
        --masterauth redis
        --maxclients 8192
    depends_on:
      order-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G

  stock-db-replica:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof stock-db 6379
        --masterauth redis
        --maxclients 12288
    depends_on:
      stock-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 384M

  stock-db-replica-2:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof stock-db 6379
        --masterauth redis
        --maxclients 12288
    depends_on:
      stock-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 384M

  payment-db-replica:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof payment-db 6379
        --masterauth redis
        --maxclients 12288
    depends_on:
      payment-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 384M

  payment-db-replica-2:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      dragonfly
        --requirepass redis
        --maxmemory 300mb
        --replicaof payment-db 6379
        --masterauth redis
        --maxclients 12288
    depends_on:
      payment-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 384M

  # ---- NATS ----

  nats:
    image: nats:2.11-alpine
    command: ["-js"]
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 256M

  # ---- Sentinel Nodes ----

  sentinel-1:
    <<: *sentinel

  sentinel-2:
    <<: *sentinel

  sentinel-3:
    <<: *sentinel
