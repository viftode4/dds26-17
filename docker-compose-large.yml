      - MAXMEMORY=530mb
      - MAXCLIENTS=4096
      - IO_THREADS=4
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 700M

  order-cluster-replica-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=265mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
