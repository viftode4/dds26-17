      - REDIS_MASTER_POOL_SIZE=512

  stock-service-7:
    <<: *stock-service
    environment:
      - INSTANCE_ID=stock-7
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512

  # ---- Payment Services (7 instances, 2 Granian workers each) ----

  payment-service-1:
    <<: *payment-service
    build: ./payment
    environment:
      - INSTANCE_ID=payment-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512

  payment-service-2:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-2
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512

  payment-service-3:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-3
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512

  payment-service-4:
    <<: *payment-service
    environment:
      - INSTANCE_ID=payment-4
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512

  payment-service-5:
    <<: *payment-service
    environment:
