# Large cluster — ~90 CPU total
# System: ~80 CPU | Locust: ~10 CPU
# App: 9 order (3 workers) + 7 stock (2 workers) + 7 payment (2 workers) instances
# Pool: 512 master per instance (27 order processes, 14 stock, 14 payment)

x-order-service: &order-service
  image: order:latest
  command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 3 --loop uvloop app:app
  environment:
    - REDIS_MASTER_POOL_SIZE=4096
  env_file:
    - env/order_redis.env
  volumes:
    - ./common:/app/common:ro
    - ./orchestrator:/app/orchestrator:ro
    - ./lua:/app/lua:ro
  depends_on:
    cluster-init:
      condition: service_completed_successfully
    nats:
      condition: service_started
  restart: on-failure
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 5s
    timeout: 3s
    start_period: 30s
    retries: 3
  deploy:
    resources:
      limits:
        cpus: "3.0"
        memory: 512M

x-stock-service: &stock-service
  image: stock:latest
  command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 2 --loop uvloop app:app
  environment:
    - REDIS_MASTER_POOL_SIZE=512
  env_file:
    - env/stock_redis.env
  volumes:
    - ./common:/app/common:ro
    - ./orchestrator:/app/orchestrator:ro
    - ./lua:/app/lua:ro
  depends_on:
    cluster-init:
      condition: service_completed_successfully
    nats:
      condition: service_started
  restart: on-failure
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 5s
    timeout: 3s
    start_period: 30s
    retries: 3
  deploy:
    resources:
      limits:
        cpus: "2.0"
        memory: 384M

x-payment-service: &payment-service
  image: payment:latest
  command: granian --interface asgi --host 0.0.0.0 --port 5000 --workers 2 --loop uvloop app:app
  environment:
    - REDIS_MASTER_POOL_SIZE=512
  env_file:
    - env/payment_redis.env
  volumes:
    - ./common:/app/common:ro
    - ./orchestrator:/app/orchestrator:ro
    - ./lua:/app/lua:ro
  depends_on:
    cluster-init:
      condition: service_completed_successfully
    nats:
      condition: service_started
  restart: on-failure
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 5s
    timeout: 3s
    start_period: 30s
    retries: 3
  deploy:
    resources:
      limits:
        cpus: "2.0"
        memory: 384M

x-cluster-node: &cluster-node
  image: valkey/valkey:8.1-bookworm
  command: sh /etc/redis/cluster-node-entrypoint.sh
  volumes:
    - ./cluster-node-entrypoint.sh:/etc/redis/cluster-node-entrypoint.sh:ro
  healthcheck:
    test: ["CMD", "redis-cli", "-a", "redis", "--no-auth-warning", "ping"]
    interval: 5s
    timeout: 3s
    retries: 5

services:

  gateway:
    image: haproxy:3.0-bookworm
    volumes:
      - ./haproxy-large.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8000:80"
    depends_on:
      order-service-1:
        condition: service_healthy
      order-service-2:
        condition: service_healthy
      order-service-3:
        condition: service_healthy
      order-service-4:
        condition: service_healthy
      order-service-5:
        condition: service_healthy
      order-service-6:
        condition: service_healthy
      order-service-7:
        condition: service_healthy
      order-service-8:
        condition: service_healthy
      order-service-9:
        condition: service_healthy
      stock-service-1:
        condition: service_healthy
      stock-service-2:
        condition: service_healthy
      stock-service-3:
        condition: service_healthy
      stock-service-4:
        condition: service_healthy
      stock-service-5:
        condition: service_healthy
      stock-service-6:
        condition: service_healthy
      stock-service-7:
        condition: service_healthy
      payment-service-1:
        condition: service_healthy
      payment-service-2:
        condition: service_healthy
      payment-service-3:
        condition: service_healthy
      payment-service-4:
        condition: service_healthy
      payment-service-5:
        condition: service_healthy
      payment-service-6:
        condition: service_healthy
      payment-service-7:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 512M

  # ---- Order Services (9 instances, 3 Granian workers each) ----

  order-service-1:
    <<: *order-service
    build: ./order
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-1
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512

  order-service-2:
    <<: *order-service
    environment:
