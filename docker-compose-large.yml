      - IO_THREADS=2
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 150M

  # ---- NATS ----

  nats:
    image: nats:2.11-alpine
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 256M

  # ---- Cluster Init (one-shot) ----

  cluster-init:
    image: valkey/valkey:8.1-bookworm
    command: sh /etc/redis/cluster-init.sh
    volumes:
      - ./cluster-init.sh:/etc/redis/cluster-init.sh:ro
    depends_on:
      order-cluster-1:
        condition: service_healthy
      order-cluster-2:
        condition: service_healthy
      order-cluster-3:
        condition: service_healthy
      order-cluster-replica-1:
        condition: service_healthy
      order-cluster-replica-2:
        condition: service_healthy
      order-cluster-replica-3:
        condition: service_healthy
      stock-cluster-1:
        condition: service_healthy
      stock-cluster-2:
        condition: service_healthy
      stock-cluster-3:
        condition: service_healthy
      stock-cluster-replica-1:
        condition: service_healthy
      stock-cluster-replica-2:
        condition: service_healthy
      stock-cluster-replica-3:
        condition: service_healthy
      payment-cluster-1:
        condition: service_healthy
      payment-cluster-2:
        condition: service_healthy
      payment-cluster-3:
        condition: service_healthy
      payment-cluster-replica-1:
        condition: service_healthy
      payment-cluster-replica-2:
        condition: service_healthy
      payment-cluster-replica-3:
        condition: service_healthy
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 64M
