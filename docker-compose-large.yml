    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-8
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512

  order-service-9:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-9
