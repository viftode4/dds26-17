  stock-service-2:
    <<: *stock-service
    environment:
      - INSTANCE_ID=stock-2
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512

  stock-service-3:
    <<: *stock-service
