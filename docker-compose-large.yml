          memory: 150M

  # ---- Payment Cluster (3 masters + 3 replicas) ----

  payment-cluster-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=200mb
      - MAXCLIENTS=4096
      - IO_THREADS=3
      - MIN_REPLICAS_TO_WRITE=1
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  payment-cluster-2:
    <<: *cluster-node
    environment:
      - MAXMEMORY=200mb
      - MAXCLIENTS=4096
      - IO_THREADS=3
      - MIN_REPLICAS_TO_WRITE=1
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  payment-cluster-3:
    <<: *cluster-node
    environment:
      - MAXMEMORY=200mb
      - MAXCLIENTS=4096
      - IO_THREADS=3
      - MIN_REPLICAS_TO_WRITE=1
