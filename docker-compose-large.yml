    <<: *cluster-node
    environment:
      - MAXMEMORY=200mb
      - MAXCLIENTS=4096
      - IO_THREADS=3
      - MIN_REPLICAS_TO_WRITE=1
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  stock-cluster-replica-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=100mb
      - MAXCLIENTS=4096
      - IO_THREADS=2
