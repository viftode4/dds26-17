      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-4
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512

  order-service-5:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-5
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512

  order-service-6:
    <<: *order-service
    environment:
      - GATEWAY_URL=http://gateway:80
      - INSTANCE_ID=order-6
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512

  order-service-7:
    <<: *order-service
