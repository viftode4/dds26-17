    environment:
      - INSTANCE_ID=payment-7
      - NATS_URL=nats://nats:4222
      - REDIS_MASTER_POOL_SIZE=512

  # ---- Order Cluster (3 masters + 3 replicas) ----

  order-cluster-1:
    <<: *cluster-node
    environment:
      - MAXMEMORY=530mb
      - MAXCLIENTS=4096
      - IO_THREADS=4
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 700M

  order-cluster-2:
