events { worker_connections 4096;}

http {
    tcp_nodelay on;
    tcp_nopush on;
    access_log off;

    upstream order-app {
        server order-service-1:5000;
        server order-service-2:5000;
        keepalive 128;
    }
    upstream payment-app {
        server payment-service:5000;
        server payment-service-2:5000;
        keepalive 128;
    }
    upstream stock-app {
        server stock-service:5000;
        server stock-service-2:5000;
        keepalive 128;
    }
    server {
        listen 80;
        location /orders/ {
           proxy_pass   http://order-app/;
           proxy_http_version 1.1;
           proxy_set_header Connection "";
           proxy_buffering off;
        }
        location /payment/ {
           proxy_pass   http://payment-app/;
           proxy_http_version 1.1;
           proxy_set_header Connection "";
           proxy_buffering off;
        }
        location /stock/ {
           proxy_pass   http://stock-app/;
           proxy_http_version 1.1;
           proxy_set_header Connection "";
           proxy_buffering off;
        }
    }
}
